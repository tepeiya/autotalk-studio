version: "3.9"

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: autotalk-backend
    ports:
      - "8000:8000"
    volumes:
      - ./storage:/app/storage
      - ./config:/app/config
    env_file:
      - ./backend/.env
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: autotalk-frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend
    restart: unless-stopped

